name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build
        run: bun tauri build --bundles deb,rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  archlinux:
    name: Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm rustup webkit2gtk-4.1 libayatana-appindicator librsvg unzip curl

      - name: Setup Rust
        run: rustup default stable

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        run: $HOME/.bun/bin/bun install

      - name: Build
        run: $HOME/.bun/bin/bun tauri build --no-bundle

      - name: Create pacman package
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          export VERSION="${VERSION:-0.1.0}"
          PKG_DIR="pkg-arch"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/128x128/apps"
          cp src-tauri/target/release/scholarmetric "$PKG_DIR/usr/bin/"
          cp src-tauri/icons/128x128.png "$PKG_DIR/usr/share/icons/hicolor/128x128/apps/scholarmetric.png"
          printf '%s\n' '[Desktop Entry]' 'Name=ScholarMetric' 'Exec=scholarmetric' 'Icon=scholarmetric' 'Type=Application' 'Categories=Education;' > "$PKG_DIR/usr/share/applications/scholarmetric.desktop"
          printf '%s\n' "pkgname = scholarmetric" "pkgver = ${VERSION}-1" "pkgdesc = Student grade management desktop app" "url = https://github.com/anastasia274/scholarmetric" "arch = x86_64" "license = MIT" "depend = webkit2gtk-4.1" "depend = gtk3" > "$PKG_DIR/.PKGINFO"
          cd "$PKG_DIR"
          fakeroot -- bash -c "tar -czf ../scholarmetric-${VERSION}-1-x86_64.pkg.tar.gz .PKGINFO usr/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-bundle
          path: "*.pkg.tar.gz"

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build
        run: bun tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, archlinux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.pkg.tar.gz
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
